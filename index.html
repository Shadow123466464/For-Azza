<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Azza</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="wordle.css">
</head>
<body>
    <div class="wordle-overlay" id="wordleOverlay">
        <div class="wordle-container">
            <div class="wordle-header">
                <h1 class="wordle-title">💕 Love Wordle 💕</h1>
                <p class="wordle-subtitle">Guess the word that describes the message below</p>
            </div>
            
            <div class="wordle-message-preview" id="wordleMessagePreview">
                <p id="previewText"></p>
            </div>
            
            <div class="wordle-board" id="wordleBoard"></div>
            
            <div class="wordle-keyboard" id="wordleKeyboard"></div>
            
            <div class="wordle-controls">
                <button class="wordle-btn hint-btn" id="hintBtn">
                    <i class="fas fa-lightbulb"></i> Hint
                </button>
                <button class="wordle-btn skip-btn" id="skipBtn">
                    <i class="fas fa-forward"></i> Skip
                </button>
            </div>
            
            <div class="wordle-hints" id="wordleHints"></div>
            
            <div class="wordle-result" id="wordleResult">
                <div class="result-content">
                    <h2 id="resultTitle"></h2>
                    <div class="result-word" id="resultWord"></div>
                    <div class="result-message" id="resultMessage"></div>
                    <button class="wordle-btn continue-btn" id="continueBtn">
                        <i class="fas fa-heart"></i> Continue to Love Letters
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="background-decorations">
            <div class="heart-decoration heart-1">❤️</div>
            <div class="heart-decoration heart-2">❤️</div>
            <div class="heart-decoration heart-3">❤️</div>
            <div class="heart-decoration heart-4">❤️</div>
            <div class="heart-decoration heart-5">❤️</div>
        </div>
        
        <div class="container">
            <h1>
                Love Letters
                <span class="heart-icon">❤️</span>
            </h1>
            <p class="subtitle">Open a letter when you feel the world is heavy and remember <span style="color: #ff6b81;">there is someone ready to create this for you</span></p>
            <div class="envelopes"></div>
        </div>
        
        <div class="modal" id="letterModal">
            <div class="paper">
                <div id="letterContent"></div>
                <button id="closeModal">
                    <i class="fas fa-heart"></i> Close
                </button>
            </div>
        </div>
        
        <div class="secret-letter-button" id="secretLetterButton">For You</div>
        
        <div class="secret-letter-modal" id="secretLetterModal">
            <div class="secret-letter-content">
                <div class="secret-letter-text" id="secretLetterText"></div>
                <button class="return-button" id="returnButton">Return</button>
            </div>
        </div>
        <div class="wordle-replay-button" id="wordleReplayButton">
    <i class="fas fa-gamepad"></i> Play Wordle
        </div>
        <div class="galaxy-animation"></div>
    </div>

    <script src="data.js"></script>
    <script src="wordle.js"></script>
    <script src="script.js"></script>
</body>
</html>
